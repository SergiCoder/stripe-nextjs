name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  # ─── Typecheck ────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      NEXT_PUBLIC_API_URL: http://localhost:8001
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # ─── Audit ────────────────────────────────────────────────────────────────
  audit:
    name: Audit (pnpm audit)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run audit
        run: pnpm audit --json > /tmp/audit-raw.json || true
      - name: Build report
        run: |
          node -e "
          const fs = require('fs');
          const raw = fs.readFileSync('/tmp/audit-raw.json', 'utf8');
          let data;
          try { data = JSON.parse(raw); } catch { process.exit(0); }
          const vulns = data.vulnerabilities || {};
          const rows = Object.values(vulns)
            .filter(v => v.severity !== 'info')
            .map(v => \`| \${v.name} | \${v.severity} | \${v.range} | \${v.fixAvailable ? 'Yes' : 'No'} |\`);
          if (rows.length) {
            const out = ['| Package | Severity | Range | Fix available |', '|---|---|---|---|', ...rows].join('\n');
            fs.writeFileSync('/tmp/audit-report.txt', out);
          } else {
            fs.writeFileSync('/tmp/audit-report.txt', 'no-vulns');
          }
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-report
          path: /tmp/audit-report.txt
          retention-days: 1

  # ─── PR Comment ───────────────────────────────────────────────────────────
  pr-comment:
    name: Post PR comment
    if: github.event_name == 'pull_request'
    needs: [audit]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: audit-report
          path: reports
        continue-on-error: true
      - name: Post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          report_file="reports/audit-report.txt"
          if [ ! -f "$report_file" ] || grep -q "no-vulns" "$report_file"; then
            echo "No vulnerabilities found — no comment needed."
            exit 0
          fi
          gh api "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("Vulnerability Audit"))) | .id' \
            | xargs -I{} gh api -X DELETE "repos/${GH_REPO}/issues/comments/{}" 2>/dev/null || true
          printf "## ⚠️ Vulnerability Audit\n\n" | cat - "$report_file" \
            | gh pr comment "$PR_NUMBER" --body-file -
