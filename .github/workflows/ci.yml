name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  # ─── Typecheck ────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # ─── Test ─────────────────────────────────────────────────────────────────
  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      NEXT_PUBLIC_API_URL: http://localhost:8001
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # ─── Audit & dependency freshness ───────────────────────────────────────
  audit:
    name: Audit & deps
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Vulnerability audit
        run: pnpm audit --json > /tmp/audit-raw.json || true

      - name: Outdated dependencies
        run: pnpm outdated --format json 2>/dev/null > /tmp/outdated-raw.json || true

      - name: Build and post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node -e "
          const fs = require('fs');
          let comment = '';

          // ── Vulnerability audit ──
          try {
            const data = JSON.parse(fs.readFileSync('/tmp/audit-raw.json', 'utf8'));
            const rows = Object.values(data.vulnerabilities || {})
              .filter(v => v.severity !== 'info')
              .map(v => \`| \${v.name} | \${v.severity} | \${v.range} | \${v.fixAvailable ? 'Yes' : 'No'} |\`);
            if (rows.length) {
              comment += '## ⚠️ Vulnerability Audit\n\n';
              comment += '| Package | Severity | Range | Fix available |\n|---|---|---|---|\n';
              comment += rows.join('\n') + '\n\n';
            }
          } catch {}

          // ── Outdated dependencies ──
          try {
            const data = JSON.parse(fs.readFileSync('/tmp/outdated-raw.json', 'utf8'));
            const rows = Object.entries(data)
              .filter(([, v]) => v.latest && v.current !== v.latest)
              .map(([name, v]) => \`| \${name} | \${v.current} | \${v.latest} | \${v.dependencyType} |\`);
            if (rows.length) {
              comment += '## Outdated Dependencies\n\n';
              comment += '| Package | Current | Latest | Type |\n|---|---|---|---|\n';
              comment += rows.join('\n') + '\n\n';
              comment += '> Run \`pnpm update\` to update.\n';
            }
          } catch {}

          fs.writeFileSync('/tmp/pr-comment.txt', comment);
          "

          # Delete previous bot comment if present
          gh api "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("Vulnerability Audit") or contains("Outdated Dependencies"))) | .id' \
            | xargs -I{} gh api -X DELETE "repos/${GH_REPO}/issues/comments/{}" 2>/dev/null || true

          if [ ! -s /tmp/pr-comment.txt ]; then
            echo "No audit or dependency issues — no comment needed."
            exit 0
          fi

          gh pr comment "$PR_NUMBER" --body-file /tmp/pr-comment.txt
